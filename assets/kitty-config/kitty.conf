# Font (Nerd Font for Powerlevel10k icons)
font_family      JetBrainsMono Nerd Font Mono
font_size        14.0

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Transparency
background_opacity 0.92
dynamic_background_opacity yes
background_image_layout cscaled

# Window
window_padding_width 8
hide_window_decorations no
confirm_os_window_close -1

# Layouts (splits layout required for vsplit/hsplit to work correctly)
enabled_layouts splits,stack,tall,fat,grid

# Tabs (min_tabs=1 ensures tab bar always shows, even with one tab)
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
tab_bar_min_tabs 1
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"
active_tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"

# Scrollback
scrollback_lines 10000

# URLs - Cmd+click to open
url_style curly
open_url_with default
detect_urls yes
underline_hyperlinks always
mouse_map cmd+left click ungrabbed mouse_handle_click link

# Bell
enable_audio_bell yes
visual_bell_duration 0
bell_on_tab "🔔 "

# Notifications (alert when long commands finish)
notify_on_cmd_finish unfocused 10.0 notify

# Performance
repaint_delay 6
input_delay 1
sync_to_monitor yes

# Remote control (required by the kitty skill — let Claude drive panes)
allow_remote_control yes
listen_on unix:/tmp/kitty

# Shell integration (marks at prompts, jump between prompts, etc.)
shell_integration enabled

# macOS specific
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_titlebar_color #000000
single_instance yes

# Keyboard shortcuts
map cmd+t new_tab_with_cwd
map cmd+w launch --type=overlay --cwd=current ~/.config/kitty/scripts/close-and-save.sh
map cmd+shift+t launch --type=overlay --cwd=current ~/.config/kitty/scripts/reopen-closed.sh
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5

# Splits
map cmd+d launch --location=vsplit --cwd=current --copy-colors
map cmd+shift+d launch --location=hsplit --cwd=current --copy-colors
map cmd+shift+w close_window
map cmd+shift+enter toggle_layout stack
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Smart split (auto-picks horizontal or vertical based on pane shape)
map cmd+shift+s launch --location=split --cwd=current --copy-colors

# Resize panes (Ctrl+Cmd+arrow keys)
map ctrl+cmd+left resize_window narrower 3
map ctrl+cmd+right resize_window wider 3
map ctrl+cmd+up resize_window taller 3
map ctrl+cmd+down resize_window shorter 3
map ctrl+cmd+0 resize_window reset

# Open URLs with keyboard (press this, then type the hint letter)
map cmd+shift+u open_url_with_hints

# Open file paths with keyboard
map cmd+shift+f kitten hints --type path --program -

# Intercept Cmd+Q to save workspace before quitting
map cmd+q launch --type=overlay --cwd=current ~/.config/kitty/scripts/save-and-quit.sh

# AFK Command Center — opens Claude, auto-triggers /kitty afk + /remote-control
map f12 launch --type=os-window --title="AFK Command Center" --cwd=~ ~/.config/kitty/scripts/afk-launch.sh

# Opacity controls
map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default

# Default theme: Sky
include themes/sky.conf

# Auto-apply a Calvin & Hobbes background to every new window.
# Prefers unused CH themes, falls back to random when all 15 are in use.
# Path is resolved relative to ~/.config/kitty/.
watcher watchers/ch_bg.py
